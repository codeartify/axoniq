
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://fitnesslab.eu.auth0.com/
          jwk-set-uri: https://fitnesslab.eu.auth0.com/.well-known/jwks.json
  axon:
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  axonserver:
    enabled: false
